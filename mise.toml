[tools]
python = "3.11"
uv = "latest"

[tasks."model:download"]
description = "Download best.pt from SageMaker S3 (requires SAGEMAKER_MODEL_S3_URI env var)"
run = "bash model/download.sh"

[tasks."model:export"]
description = "Export best.pt to ONNX FP16 with optional ORT graph optimization"
run = "uv run --project model python model/export.py"

[tasks."model:verify"]
description = "Regression test: compare PT vs ONNX mAP@0.5, assert |delta| < 0.005 (requires VAL_DATASET_YAML)"
run = "uv run --project model python model/verify.py"

[tasks."model:upload"]
description = "Push ONNX model, metadata.yaml, and README.md to Hugging Face Hub (requires HF_USER env var)"
run = "bash model/upload.sh"

[tasks.dev]
description = "Run Vite dev server"
run = "bun run dev"

[tasks.build]
description = "Type-check and build production bundle"
run = "bun run build"

[tasks.lint]
description = "Lint with Biome"
run = "bun run lint"

[tasks.format]
description = "Format with Biome"
run = "bun run format"

[tasks.typecheck]
description = "Type-check without emit"
run = "bun run typecheck"

[tasks.test]
description = "Run tests (placeholder until Sprint 3)"
run = "bun run test"
