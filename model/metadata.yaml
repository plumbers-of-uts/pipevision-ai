model:
  name: yolo26m-seg-pipevision-fp16
  format: onnx
  input_shape: [1, 3, 640, 640]
  precision: fp16
  opset: 17
  size_mb: 45
  # SHA-256 of yolo26m-seg-fp16.onnx — used by the frontend Service Worker for
  # cache invalidation and integrity check (mirrors VITE_MODEL_SHA256).
  sha256: "315d02d175883534892e0b19de55dc7730e0bcc197877eca969347abfb42420e"
  # End-to-end (NMS-included) instance-segmentation export.
  outputs:
    - name: output0
      shape: [1, 100, 38]    # max_det × (x1,y1,x2,y2,conf,classId + 32 mask coeffs)
      dtype: float32
    - name: output1
      shape: [1, 32, 160, 160]  # mask prototypes
      dtype: float16

mask:
  channels: 32
  resolution: 160

task: segment

# Class IDs and order MUST match data.yaml and src/features/history-store/classes.ts.
classes:
  - { id: 0, name: Deformation,  severity: high }
  - { id: 1, name: Obstacle,     severity: high }
  - { id: 2, name: Rupture,      severity: critical }
  - { id: 3, name: Disconnect,   severity: critical }
  - { id: 4, name: Misalignment, severity: medium }
  - { id: 5, name: Deposition,   severity: low }

inference:
  conf_threshold: 0.25
  iou_threshold: 0.45
  max_detections: 100

dataset:
  source: Pipeline-defect segmentation set (custom)
  total_images: 22122
  train: 15484
  val: 3319
  test: 3319

# Validation-set metrics from the training run (results.csv, final epoch 150)
# and per_class_metrics.csv (AP50 = mAP@0.5, AP = mAP@0.5:0.95).
metrics:
  validation:
    epoch: 150
    precision_box: 0.923
    recall_box: 0.891
    mAP_box_0_5: 0.931
    mAP_box_0_5_0_95: 0.682
    precision_mask: 0.827
    recall_mask: 0.793
    mAP_mask_0_5: 0.788
    mAP_mask_0_5_0_95: 0.480
  per_class:
    # name:            [AP50_box, AP_box, AP50_mask, AP_mask]
    Deformation:       [0.904, 0.561, 0.723, 0.349]
    Obstacle:          [0.956, 0.713, 0.920, 0.637]
    Rupture:           [0.910, 0.628, 0.849, 0.501]
    Disconnect:        [0.969, 0.824, 0.753, 0.521]
    Misalignment:      [0.986, 0.757, 0.769, 0.455]
    Deposition:        [0.954, 0.648, 0.778, 0.448]
