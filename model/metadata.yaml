model:
  name: yolo26m-seg-pipevision-fp16
  format: onnx
  input_shape: [1, 3, 640, 640]
  precision: fp16
  opset: 17
  size_mb: 45
  # SHA-256 of yolo26m-seg-fp16.onnx — used by the frontend Service Worker for
  # cache invalidation and integrity check (mirrors VITE_MODEL_SHA256).
  sha256: "315d02d175883534892e0b19de55dc7730e0bcc197877eca969347abfb42420e"
  # End-to-end (NMS-included) instance-segmentation export.
  outputs:
    - name: output0
      shape: [1, 100, 38]    # max_det × (x1,y1,x2,y2,conf,classId + 32 mask coeffs)
      dtype: float32
    - name: output1
      shape: [1, 32, 160, 160]  # mask prototypes
      dtype: float16

mask:
  channels: 32
  resolution: 160

task: segment

# Class IDs and order MUST match data.yaml and src/features/history-store/classes.ts.
classes:
  - { id: 0, name: Deformation,  severity: high }
  - { id: 1, name: Obstacle,     severity: high }
  - { id: 2, name: Rupture,      severity: critical }
  - { id: 3, name: Disconnect,   severity: critical }
  - { id: 4, name: Misalignment, severity: medium }
  - { id: 5, name: Deposition,   severity: low }

inference:
  conf_threshold: 0.25
  iou_threshold: 0.45
  max_detections: 100

dataset:
  source: Pipeline-defect segmentation set (custom)
  total_images: 22122
  train: 15484
  val: 3319
  test: 3319

# Metrics are published after the segmentation training run exports results.csv.
# TODO(oma-deferred): fill once the per-class / overall mAP export is available.
metrics:
  test:
    mAP_box_0_5: null
    mAP_box_0_5_0_95: null
    mAP_mask_0_5: null
    mAP_mask_0_5_0_95: null
  validation:
    mAP_box_0_5: null
    mAP_box_0_5_0_95: null
